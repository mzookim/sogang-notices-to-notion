name: notices-crawler

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  # 크롤러는 저장소 내용을 읽기만 하므로 기본 권한을 최소화한다.
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Seoul
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    concurrency:
      group: notices-crawler
      cancel-in-progress: true

    steps:
      - name: Checkout
        # 공식 저장소 기준 최신 권장 메이저를 사용해 실행 환경 경고를 줄인다.
        uses: actions/checkout@v6

      - name: Set up Python
        # 공식 저장소 기준 최신 권장 메이저를 사용하고 requirements.txt를 캐시 키로 묶는다.
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright browsers
        # 기본 설정이 chromium이므로 CI에서는 필요한 브라우저만 설치한다.
        run: python -m playwright install --with-deps chromium

      - name: Run crawler
        run: python main.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
